{% extends "base.html" %}

{% block title %}Account Mapping — New Light Budget Tool{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="font-heading text-h1 text-text">Account Mapping</h1>
      <p class="text-caption text-neutral mt-1">Manage which Xero accounts roll into each budget summary category</p>
    </div>

    <!-- New category form -->
    <div x-data="{ showForm: false }">
      <button @click="showForm = !showForm"
              class="inline-flex items-center px-4 py-2 rounded-btn text-white font-semibold transition-colors min-h-btn"
              style="background-color: var(--primary);"
              onmouseover="this.style.backgroundColor='var(--primary-hover)'"
              onmouseout="this.style.backgroundColor='var(--primary)'">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        New Category
      </button>

      <div x-show="showForm" x-cloak
           class="absolute right-0 mt-2 bg-surface rounded-card shadow-lg border border-outline p-5 z-20 w-80"
           @click.outside="showForm = false">
        <form hx-post="/settings/accounts/category"
              hx-target="#category-list"
              hx-swap="innerHTML"
              @htmx:after-request="showForm = false"
              class="space-y-3">
          <div>
            <label class="block text-caption text-neutral font-medium mb-1">Section</label>
            <select name="section" class="w-full rounded-btn border border-outline px-3 py-2 text-figure bg-white text-text focus:ring-2 focus:ring-primary">
              <option value="income">Income</option>
              <option value="expenses">Expenses</option>
            </select>
          </div>
          <div>
            <label class="block text-caption text-neutral font-medium mb-1">Budget Label</label>
            <input type="text" name="budget_label" required placeholder="e.g. Mission Giving"
                   class="w-full rounded-btn border border-outline px-3 py-2 text-figure bg-white text-text focus:ring-2 focus:ring-primary">
          </div>
          <div>
            <label class="block text-caption text-neutral font-medium mb-1">Key (optional)</label>
            <input type="text" name="key" placeholder="auto-generated from label"
                   class="w-full rounded-btn border border-outline px-3 py-2 text-figure font-mono bg-white text-text focus:ring-2 focus:ring-primary">
          </div>
          <button type="submit"
                  class="w-full px-4 py-2 rounded-btn text-white font-semibold transition-colors min-h-btn"
                  style="background-color: var(--primary);"
                  onmouseover="this.style.backgroundColor='var(--primary-hover)'"
                  onmouseout="this.style.backgroundColor='var(--primary)'">
            Create Category
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Category list (htmx target) -->
  <div id="category-list"
       hx-get="/settings/accounts/categories"
       hx-trigger="load"
       hx-swap="innerHTML">
    {% include "partials/category_list.html" %}
  </div>

</div>
{% endblock %}
