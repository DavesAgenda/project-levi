{# Xero sync buttons — visible to admin users only.
   Uses htmx to POST sync endpoints and display results inline. #}

<div id="sync-container" class="inline-flex items-center gap-3 flex-wrap">
  <button
    hx-post="/api/xero/sync-now"
    hx-target="#sync-result"
    hx-swap="innerHTML"
    hx-indicator="#sync-spinner"
    class="inline-flex items-center gap-2 bg-primary text-white font-semibold rounded-btn min-h-btn px-5 py-2 hover:bg-primary-hover transition-colors"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
    </svg>
    Sync with Xero
  </button>

  <button
    hx-post="/api/xero/sync-budget?year=2026"
    hx-target="#sync-result"
    hx-swap="innerHTML"
    hx-indicator="#sync-spinner"
    class="inline-flex items-center gap-2 border border-primary text-primary font-semibold rounded-btn min-h-btn px-5 py-2 hover:bg-primary hover:text-white transition-colors"
    title="Pulls Xero's BudgetSummary and backfills nulls/gaps in budgets/2026.yaml"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
    </svg>
    Sync Budget
  </button>

  <button
    hx-post="/api/xero/sync-historical?from_year=2021&to_year=2026"
    hx-target="#sync-result"
    hx-swap="innerHTML"
    hx-indicator="#sync-spinner"
    hx-confirm="This will fetch ~60 monthly snapshots from Xero (2021–2026). Continue?"
    class="inline-flex items-center gap-2 border border-primary text-primary font-semibold rounded-btn min-h-btn px-5 py-2 hover:bg-primary hover:text-white transition-colors"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    Sync History (5yr)
  </button>

  {# Loading spinner (hidden until htmx triggers it) #}
  <span id="sync-spinner" class="htmx-indicator">
    <svg class="animate-spin h-5 w-5 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </span>

  {# Result area — populated by htmx response #}
  <div id="sync-result" class="text-caption"></div>
</div>

{# htmx event handler to format the JSON response for sync endpoints #}
<script>
document.body.addEventListener('htmx:afterRequest', function(event) {
  var path = event.detail.pathInfo.requestPath;
  if (!path.startsWith('/api/xero/sync')) return;

  var target = document.getElementById('sync-result');
  if (!target) return;

  if (event.detail.successful) {
    try {
      var data = JSON.parse(event.detail.xhr.responseText);
      if (path.indexOf('/sync-budget') !== -1) {
        target.innerHTML = '<span class="text-success font-medium">Budget synced</span>' +
          '<span class="text-neutral ml-2">(' + data.account_count + ' accounts, $' +
          data.total.toLocaleString() + ')</span>';
        return;
      }
      if (data.status === 'ok') {
        var detail = data.snapshots.length + ' snapshots, ' + data.duration_seconds + 's';
        if (data.months_synced) detail = data.months_synced + ' months, ' + detail;
        target.innerHTML = '<span class="text-success font-medium">Synced successfully</span>' +
          '<span class="text-neutral ml-2">(' + detail + ')</span>';
      } else if (data.status === 'partial') {
        target.innerHTML = '<span class="text-warning font-medium">Partial sync</span>' +
          '<span class="text-neutral ml-2">' + data.errors.join('; ') + '</span>';
      } else {
        target.innerHTML = '<span class="text-danger font-medium">Sync failed</span>' +
          '<span class="text-neutral ml-2">' + data.errors.join('; ') + '</span>';
      }
    } catch (e) {
      target.innerHTML = '<span class="text-danger font-medium">Unexpected response</span>';
    }
  } else {
    var status = event.detail.xhr.status;
    var msg = 'Sync failed';
    try {
      var err = JSON.parse(event.detail.xhr.responseText);
      msg = err.detail || msg;
    } catch (e) {}
    target.innerHTML = '<span class="text-danger font-medium">' + msg + ' (' + status + ')</span>';
  }
});
</script>
