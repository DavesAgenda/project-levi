services:
  budget-app:
    build: .
    image: ghcr.io/valid-agenda/church-budget:latest
    container_name: church-budget
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"    # Localhost only — Caddy handles TLS/proxy
    volumes:
      - ./data:/project/data       # Persistent data (actuals, snapshots)
    environment:
      - XERO_CLIENT_ID_FILE=/run/secrets/xero_client_id
      - XERO_CLIENT_SECRET_FILE=/run/secrets/xero_client_secret
      - AUTH0_DOMAIN_FILE=/run/secrets/auth0_domain
      - AUTH0_CLIENT_ID_FILE=/run/secrets/auth0_client_id
      - AUTH0_CLIENT_SECRET_FILE=/run/secrets/auth0_client_secret
      - SYNC_API_KEY_FILE=/run/secrets/sync_api_key
    secrets:
      - xero_client_id
      - xero_client_secret
      - auth0_domain
      - auth0_client_id
      - auth0_client_secret
      - sync_api_key
    networks:
      - church-net
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  church-net:
    external: true    # Shared with n8n for inter-service communication

secrets:
  xero_client_id:
    file: ./secrets/xero_client_id.txt
  xero_client_secret:
    file: ./secrets/xero_client_secret.txt
  auth0_domain:
    file: ./secrets/auth0_domain.txt
  auth0_client_id:
    file: ./secrets/auth0_client_id.txt
  auth0_client_secret:
    file: ./secrets/auth0_client_secret.txt
  sync_api_key:
    file: ./secrets/sync_api_key.txt
